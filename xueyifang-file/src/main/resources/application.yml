server:
  port: 8600

spring:
  application:
    name: xueyifang-file
  servlet:
    multipart:
      max-file-size: ${XUEYIFANG_FILE_MAX_FILE_SIZE:10MB}
      max-request-size: ${XUEYIFANG_FILE_MAX_REQUEST_SIZE:50MB}
  config:
    import: optional:nacos:${spring.application.name}.yml?group=${NACOS_GROUP:DEFAULT_GROUP}
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yml

xueyifang:
  file:
    storage:
      type: ${XUEYIFANG_FILE_STORAGE_TYPE:local}
      local:
        upload-path: ${XUEYIFANG_FILE_UPLOAD_PATH:uploads}
        url-prefix: ${XUEYIFANG_FILE_URL_PREFIX:/api/file/view}
        enable-date-path: ${XUEYIFANG_FILE_ENABLE_DATE_PATH:true}
      allowed-types:
        - jpg
        - jpeg
        - png
        - gif
        - webp
      max-size:
        user_avatar: ${XUEYIFANG_FILE_USER_AVATAR_MAX_SIZE:1MB}
        service_image: ${XUEYIFANG_FILE_SERVICE_IMAGE_MAX_SIZE:5MB}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{requestId:-}]"
