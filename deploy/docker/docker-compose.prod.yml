# xueyifang-cloud ЩњВњЛЗОГ Docker Compose
# ЪЙгУЗНЗЈ:
#   1. ИДжЦ .env.example ЮЊ .env ВЂЬюаДЩњВњХфжУ
#   2. docker compose -f docker-compose.prod.yml up -d

services:
  # ========== ЛљДЁЩшЪЉ ==========
  mysql:
    image: mysql:8.0.39
    container_name: xueyifang-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-xueyifang}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --max-connections=500
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: xueyifang-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nacos:
    image: nacos/nacos-server:v2.4.3
    container_name: xueyifang-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY:-nacos}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE}
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
    ports:
      - "${NACOS_PORT:-8848}:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - nacos-data:/home/nacos/data
      - nacos-logs:/home/nacos/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ========== вЕЮёЗўЮё ==========
  gateway:
    image: xueyifang/xueyifang-gateway:${TAG:-latest}
    container_name: xueyifang-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-18080}:8080"
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_USERNAME: ${NACOS_USERNAME}
      NACOS_PASSWORD: ${NACOS_PASSWORD}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-}
      XUEYIFANG_REDIS_HOST: redis
      XUEYIFANG_REDIS_PORT: 6379
      XUEYIFANG_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      XUEYIFANG_JWT_SECRET: ${JWT_SECRET}
    depends_on:
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  auth:
    image: xueyifang/xueyifang-auth:${TAG:-latest}
    container_name: xueyifang-auth
    restart: unless-stopped
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_USERNAME: ${NACOS_USERNAME}
      NACOS_PASSWORD: ${NACOS_PASSWORD}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-}
      XUEYIFANG_MYSQL_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-xueyifang}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      XUEYIFANG_MYSQL_USERNAME: ${MYSQL_APP_USERNAME:-xueyifang}
      XUEYIFANG_MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD}
      XUEYIFANG_REDIS_HOST: redis
      XUEYIFANG_REDIS_PORT: 6379
      XUEYIFANG_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      XUEYIFANG_JWT_SECRET: ${JWT_SECRET}
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  user:
    image: xueyifang/xueyifang-user:${TAG:-latest}
    container_name: xueyifang-user
    restart: unless-stopped
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_USERNAME: ${NACOS_USERNAME}
      NACOS_PASSWORD: ${NACOS_PASSWORD}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-}
      XUEYIFANG_MYSQL_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-xueyifang}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      XUEYIFANG_MYSQL_USERNAME: ${MYSQL_APP_USERNAME:-xueyifang}
      XUEYIFANG_MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD}
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy

  service:
    image: xueyifang/xueyifang-service:${TAG:-latest}
    container_name: xueyifang-service
    restart: unless-stopped
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_USERNAME: ${NACOS_USERNAME}
      NACOS_PASSWORD: ${NACOS_PASSWORD}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-}
      XUEYIFANG_MYSQL_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-xueyifang}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      XUEYIFANG_MYSQL_USERNAME: ${MYSQL_APP_USERNAME:-xueyifang}
      XUEYIFANG_MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD}
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy

  trade:
    image: xueyifang/xueyifang-trade:${TAG:-latest}
    container_name: xueyifang-trade
    restart: unless-stopped
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_USERNAME: ${NACOS_USERNAME}
      NACOS_PASSWORD: ${NACOS_PASSWORD}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-}
      XUEYIFANG_MYSQL_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-xueyifang}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      XUEYIFANG_MYSQL_USERNAME: ${MYSQL_APP_USERNAME:-xueyifang}
      XUEYIFANG_MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD}
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy

  system:
    image: xueyifang/xueyifang-system:${TAG:-latest}
    container_name: xueyifang-system
    restart: unless-stopped
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_USERNAME: ${NACOS_USERNAME}
      NACOS_PASSWORD: ${NACOS_PASSWORD}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-}
      XUEYIFANG_MYSQL_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-xueyifang}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      XUEYIFANG_MYSQL_USERNAME: ${MYSQL_APP_USERNAME:-xueyifang}
      XUEYIFANG_MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD}
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy

  file:
    image: xueyifang/xueyifang-file:${TAG:-latest}
    container_name: xueyifang-file
    restart: unless-stopped
    volumes:
      - file-data:/app/uploads
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_USERNAME: ${NACOS_USERNAME}
      NACOS_PASSWORD: ${NACOS_PASSWORD}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-}
    depends_on:
      nacos:
        condition: service_healthy

  message:
    image: xueyifang/xueyifang-message:${TAG:-latest}
    container_name: xueyifang-message
    restart: unless-stopped
    environment:
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_USERNAME: ${NACOS_USERNAME}
      NACOS_PASSWORD: ${NACOS_PASSWORD}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-}
      XUEYIFANG_MYSQL_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-xueyifang}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      XUEYIFANG_MYSQL_USERNAME: ${MYSQL_APP_USERNAME:-xueyifang}
      XUEYIFANG_MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD}
      XUEYIFANG_REDIS_HOST: redis
      XUEYIFANG_REDIS_PORT: 6379
      XUEYIFANG_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql-data:
  redis-data:
  nacos-data:
  nacos-logs:
  file-data: