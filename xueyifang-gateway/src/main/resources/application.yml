server:
  port: 8080

spring:
  application:
    name: xueyifang-gateway
  data:
    redis:
      host: ${XUEYIFANG_REDIS_HOST:127.0.0.1}
      port: ${XUEYIFANG_REDIS_PORT:6379}
      password: ${XUEYIFANG_REDIS_PASSWORD:}
      database: ${XUEYIFANG_REDIS_DATABASE:0}
  config:
    import: optional:nacos:${spring.application.name}.yml?group=${NACOS_GROUP:DEFAULT_GROUP}
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yml
    gateway:
      routes:
        - id: xueyifang-user-auth-compat
          uri: lb://xueyifang-user
          predicates:
            - Path=/auth/currentUser,/auth/updateProfile,/auth/changePassword
        - id: xueyifang-auth
          uri: lb://xueyifang-auth
          predicates:
            - Path=/auth/**
        - id: xueyifang-user
          uri: lb://xueyifang-user
          predicates:
            - Path=/users/**,/permission/**
        - id: xueyifang-service
          uri: lb://xueyifang-service
          predicates:
            - Path=/service/**,/service-image/**,/favorite/**,/review/**
        - id: xueyifang-trade
          uri: lb://xueyifang-trade
          predicates:
            - Path=/order/**,/wallet/**,/dispute/**
        - id: xueyifang-system
          uri: lb://xueyifang-system
          predicates:
            - Path=/professional/**,/trade-location/**,/sys-config/**,/admin/professional/**,/admin/trade-location/**,/admin/sys-config/**
        - id: xueyifang-file-api-compat
          uri: lb://xueyifang-file
          predicates:
            - Path=/api/file/**
          filters:
            - StripPrefix=1
        - id: xueyifang-file
          uri: lb://xueyifang-file
          predicates:
            - Path=/file/**
        - id: xueyifang-message
          uri: lb://xueyifang-message
          predicates:
            - Path=/chat/**,/notification/**
        - id: xueyifang-message-ws-api-compat
          uri: lb:ws://xueyifang-message
          predicates:
            - Path=/api/ws,/api/ws/**
          filters:
            - StripPrefix=1
        - id: xueyifang-message-ws
          uri: lb:ws://xueyifang-message
          predicates:
            - Path=/ws,/ws/**

management:
  endpoints:
    web:
      exposure:
        include: health,info

xueyifang:
  auth:
    jwt:
      secret: ${XUEYIFANG_JWT_SECRET:xueyifang-secret-key-2025-graduation-project}
      expiration: ${XUEYIFANG_JWT_EXPIRATION:604800000ms}
      issuer: ${XUEYIFANG_JWT_ISSUER:xueyifang}

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{requestId:-}]"
