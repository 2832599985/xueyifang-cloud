server:
  port: 8400

spring:
  application:
    name: xueyifang-trade
  config:
    import: optional:nacos:${spring.application.name}.yml?group=${NACOS_GROUP:DEFAULT_GROUP}
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yml
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/xueyifang?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:xueyifang}
    password: ${MYSQL_PASSWORD:xueyifang}

management:
  endpoints:
    web:
      exposure:
        include: health,info

xueyifang:
  trade:
    tasks:
      enabled: ${TRADE_ORDER_TASKS_ENABLED:true}
      batch-size: ${TRADE_ORDER_TASK_BATCH_SIZE:100}
      unpaid-timeout-hours: ${TRADE_ORDER_UNPAID_TIMEOUT_HOURS:24}
      auto-confirm-receipt-days: ${TRADE_ORDER_AUTO_CONFIRM_RECEIPT_DAYS:7}
      seller-refund-timeout-days: ${TRADE_ORDER_SELLER_REFUND_TIMEOUT_DAYS:3}
      auto-cancel-cron: "${TRADE_ORDER_AUTO_CANCEL_CRON:0 */10 * * * ?}"
      auto-confirm-cron: "${TRADE_ORDER_AUTO_CONFIRM_CRON:0 0 * * * ?}"
      auto-refund-cron: "${TRADE_ORDER_AUTO_REFUND_CRON:0 30 * * * ?}"

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{requestId:-}]"
