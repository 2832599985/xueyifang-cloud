server:
  port: 8300

spring:
  application:
    name: xueyifang-service
  datasource:
    url: ${XUEYIFANG_MYSQL_URL:jdbc:mysql://127.0.0.1:3306/xueyifang?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${XUEYIFANG_MYSQL_USERNAME:root}
    password: ${XUEYIFANG_MYSQL_PASSWORD:123123123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  config:
    import: optional:nacos:${spring.application.name}.yml?group=${NACOS_GROUP:DEFAULT_GROUP}
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yml

management:
  endpoints:
    web:
      exposure:
        include: health,info

xueyifang:
  service:
    notification:
      enabled: ${SERVICE_NOTIFICATION_ENABLED:true}
      message-base-url: ${SERVICE_NOTIFICATION_MESSAGE_BASE_URL:http://xueyifang-message}
      create-path: ${SERVICE_NOTIFICATION_CREATE_PATH:/internal/notifications}

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{requestId:-}]"
